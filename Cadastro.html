
<html lang="pt.BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro</title>

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Cadastro do Cliente</h1>
  
    <form action="Cadastro 2.0.html">
      <fieldset>
        <legend>Informações Pessoais</legend>

        <label for="nome">Nome completo </label>
        <input
          type="text"
          id="nome"
          name="nome"
          placeholder="Digite seu Nome Completo"
          required
        /><br /><br />

        <label for="email">Email:</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="Digite seu Email"
          required
        /><br /><br />

        <label for="senha">Senha:</label>
        <input
          type="password"
          id="senha"
          name="senha"
          placeholder="Digite sua Senha"
          required
        /><br /><br />

        <label for="data_nascimento">Data de Nascimento</label>
        <input
          type="date"
          id="data_nascimento"
          name="data_nascimento"
          placeholder="Digite sua Data de Nascimento"
          required
        /><br /><br />

        <label for="cpf">CPF:</label>
        <input
          type="text"
          id="cpf"
          name="cpf"
          placeholder="000.000.000-00"
        /><br /><br />

        <label for="telefone">Telefone:</label>
        <input
          type="text"
          id="telefone"
          name="telefone"
          placeholder="00000-0000"
        /><br /><br />

        <label for="nome_da_mae">Nome da Mãe</label>
        <input
          type="text"
          id="nome_da_mae"
          name="nome_da_mae"
          placeholder="Digite o Nome da sua Mãe"
        /><br /><br />

        <label for="nome_do_pai">Nome do Pai:</label>
        <input
          type="text"
          id="nome_do_pai"
          name="nome_do_pai"
          placeholder="Digite o Nome do seu Pai"
        /><br /><br />

        <label for="estado-civil">Estado Civil:</label>

        <select id="estado-civil" name="estado-civil">
          <option value="Solteiro">Solteiro</option>
          <option value="Casado">Casado</option>
          <option value="Separado">Separado</option>
          <option value="Divorciado">Divorciado</option>
        </select>
      </fieldset>

      <fieldset>
        <legend>Endereço</legend>

        <label for="rua">Rua:</label>
        <input
          type="text"
          id="rua"
          name="rua"
          placeholder="Digite sua Rua"
        /><br /><br />

        <label for="numero">Número:</label>
        <input
          type="text"
          id="numero"
          name="numero"
          placeholder="Digite seu Número"
        /><br /><br />

        <label for="Bairro">Bairro</label>
        <input
          type="text"
          id="bairro"
          name="bairro"
          placeholder="Digite seu Bairro"
        /><br /><br />

        <label for="cidade">Cidade</label>
        <input
          type="text"
          id="cidade"
          name="cidade"
          placeholder="Digite sua Cidade"
        /><br /><br />

        <label for="estado-uf">Estado:</label>

        <select id="estado-uf" name="estado-uf">
          <option value="AC">Acre</option>
          <option value="AL">Alagoas</option>
          <option value="AP">Amapá</option>
          <option value="AM">Amazonas</option>
          <option value="BA">Bahia</option>
          <option value="CE">Ceará</option>
          <option value="DF">Distrito Federal</option>
          <option value="ES">Espírito Santo</option>
          <option value="GO">Goiás</option>
          <option value="MA">Maranhão</option>
          <option value="MT">Mato Grosso</option>
          <option value="MS">Mato Grosso do Sul</option>
          <option value="MG">Minas Gerais</option>
          <option value="PA">Pará</option>
          <option value="PB">Paraíba</option>
          <option value="PR">Paraná</option>
          <option value="PE">Pernambuco</option>
          <option value="PI">Piauí</option>
          <option value="RJ">Rio de Janeiro</option>
          <option value="RN">Rio Grande do Norte</option>
          <option value="RS">Rio Grande do Sul</option>
          <option value="RO">Rondônia</option>
          <option value="RR">Roraima</option>
          <option value="SC">Santa Catarina</option>
          <option value="SP">São Paulo</option>
          <option value="SE">Sergipe</option>
          <option value="TO">Tocantins</option></select
        ><br /><br />

        <label for="cep">CEP</label>
        <input
          type="text"
          id="cep"
          name="cep"
          placeholder="Digite seu CEP"
        /><br /><br />

        <label for="pais">País</label>
        <input
          type="text"
          id="pais"
          name="pais"
          placeholder="Digite seu País"
        /><br /><br />
      </fieldset>

      <fieldset>
        <legend>Sexo</legend>

        <label for="masculino">Masculino</label>
        <input
          type="radio"
          id="masculino"
          name="sexo"
          value="masculino"
        /><br /><br />

        <label for="feminino">Feminino</label>
        <input type="radio" id="feminino" name="sexo" value="feminino" />
      </fieldset>

      <fieldset>
        <legend>Tecnologias</legend>

        <label for="html">HTML</label>
        <input
          type="checkbox"
          id="html"
          name="tecnologias"
          value="html"
        /><br /><br />

        <label for="css">CSS</label>
        <input
          type="checkbox"
          id="css"
          name="tecnologias"
          value="css"
        /><br /><br />

        <label for="javascript">JavaScript</label>
        <input
          type="checkbox"
          id="javascript"
          name="tecnologias"
          value="javascript"
        /><br /><br />

        <label for="python">Python</label>
        <input type="checkbox" id="python" name="tecnologias" value="python" />
      </fieldset>

      <fieldset>
        <legend>Comentários</legend>

        <label for="comentarios">Comentários</label><br /><br />

        <textarea
          id="comentarios"
          name="comentarios"
          rows="5"
          cols="40"
          placeholder="Digite suas Observações"
        ></textarea
        ><br /><br />

        <input type="submit" value="Enviar Cadastro" /><br /><br />

        <input type="reset" value="Limpar Formulário" /><br /><br />

        <p>
        Já possui Cadastro?
        <a href="login.html">Fazer Login</a>
      </p>

      </fieldset>
    </form>



    
  </body>
</html>
